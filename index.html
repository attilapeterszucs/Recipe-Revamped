      // Ultra-comprehensive extension conflict prevention and error suppression
      (function() {
        // Enhanced error pattern matching
        const suppressedPatterns = [
          'content.js', 'contentScript.js', 'n8nBoyVisualEnhancements',
          'addIconStyles', 'initializeNodeIcons', 'appendChild',
          'Cannot read properties of null', 'Cannot use \'in\' operator',
          'extension://', 'chrome-extension://', 'moz-extension://',
          'Cr @', 'animation\' in undefined', 'search for \'animation\'',
          'Cannot use \'in\' operator to search for \'animation\' in undefined'
        ];

        const suppressedStackPatterns = [
          'contentScript.js:1', 'content.js:1', 'at Cr (', 'at 551 (',
          'at n (', 'at 961 (', 'at 338 (', '(anonymous) @'
        ];

        // Override window.onerror
        const originalError = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          const messageStr = String(message || '');
          const sourceStr = String(source || '');

          // Check if this is an extension error
          if (suppressedPatterns.some(pattern =>
            messageStr.includes(pattern) || sourceStr.includes(pattern)
          )) {
            return true; // Suppress error
          }

          // Check stack trace for extension patterns
          if (error && error.stack && suppressedStackPatterns.some(pattern =>
            error.stack.includes(pattern)
          )) {
            return true; // Suppress error
          }

          return originalError ? originalError.apply(this, arguments) : false;
        };

        // Override console.error to filter extension errors
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const errorStr = args.join(' ');
          if (suppressedPatterns.some(pattern => errorStr.includes(pattern)) ||
              suppressedStackPatterns.some(pattern => errorStr.includes(pattern))) {
            return; // Suppress console error
          }
          return originalConsoleError.apply(console, args);
        };

        // Override console.warn for extension warnings
        const originalConsoleWarn = console.warn;
        console.warn = function(...args) {
          const warnStr = args.join(' ');
          if (suppressedPatterns.some(pattern => warnStr.includes(pattern))) {
            return; // Suppress console warning
          }
          return originalConsoleWarn.apply(console, args);
        };

        // Enhanced unhandled rejection suppression
        window.addEventListener('unhandledrejection', function(event) {
          const error = event.reason;
          const errorStr = String(error || '');
          const stackStr = (error && error.stack) ? String(error.stack) : '';

          if (suppressedPatterns.some(pattern =>
            errorStr.includes(pattern) || stackStr.includes(pattern)
          ) || suppressedStackPatterns.some(pattern =>
            stackStr.includes(pattern)
          )) {
            event.preventDefault();
            return false;
          }
        });

        // Advanced DOM protection with error catching
        const protectDOMMethod = (obj, methodName) => {
          if (obj && obj[methodName]) {
            const originalMethod = obj[methodName];
            obj[methodName] = function(...args) {
              try {
                return originalMethod.apply(this, args);
              } catch (e) {
                // Silently fail extension DOM manipulation
                return args[0] || null;
              }
            };
          }
        };

        // Protect multiple DOM methods
        if (document.head) {
          protectDOMMethod(document.head, 'appendChild');
          protectDOMMethod(document.head, 'insertBefore');
          protectDOMMethod(document.head, 'removeChild');
        }

        if (document.body) {
          protectDOMMethod(document.body, 'appendChild');
          protectDOMMethod(document.body, 'insertBefore');
          protectDOMMethod(document.body, 'removeChild');
        }

        // Prevent extension animation property access errors
        const originalDefineProperty = Object.defineProperty;
        Object.defineProperty = function(obj, prop, descriptor) {
          try {
            return originalDefineProperty.apply(this, arguments);
          } catch (e) {
            // Silently fail if extension tries to define problematic properties
            return obj;
          }
        };
      })();

      // Listen for cookie consent updates
      window.addEventListener('cookieConsentUpdated', function(event) {
        const preferences = event.detail.preferences;
        if (preferences.analytics && !window.gtag.loaded) {
          // Load Google Analytics
          const script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-CR787RJ2VK';

          script.onload = function() {
            gtag('js', new Date());
            gtag('config', 'G-CR787RJ2VK');
            window.gtag.loaded = true;
          };
        } else if (!preferences.analytics && window.gtag.loaded) {
          // Disable Google Analytics
          gtag('config', 'G-CR787RJ2VK', {
            'anonymize_ip': true,
            'storage': 'none',
            'ad_storage': 'denied',
            'analytics_storage': 'denied'
          });
        }
      });
